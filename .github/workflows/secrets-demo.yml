name: UsingSecretsDemo

on:
  push:
    branches: ["main"]

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Access secret directly
        run: echo "The secret key is ${{ secrets.MY_SECRET_KEY }}"

      - name: Use secret in environment
        env:
          SECRET_KEY: ${{ secrets.MY_SECRET_KEY }}
        run: |
          echo "Using secret in environment"
          echo "SECRET_KEY is $SECRET_KEY"

      - name: Simulate API call
        env:
          API_KEY: ${{ secrets.MY_SECRET_KEY }}
        run: |
          echo "Calling API with secure key"
          echo "Authorization: Bearer $API_KEY"
